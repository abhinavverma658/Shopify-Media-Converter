name = "shopify-media-converter"
client_id = "YOUR_SHOPIFY_CLIENT_ID"
application_url = "https://YOUR_APP_URL"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "YOUR_DEV_STORE.myshopify.com"

[access_scopes]
scopes = "read_products,write_products,read_files,write_files"

[auth]
redirect_urls = [
  "https://YOUR_APP_URL/api/auth/callback"
]

[webhooks]
api_version = "2024-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/api/webhooks"

[pos]
embedded = false
